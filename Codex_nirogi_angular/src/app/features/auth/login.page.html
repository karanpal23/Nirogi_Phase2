<main class="login-page">
  <section class="login-panel">
    <div class="brand">
      <span>N</span>
      <div>
        <strong>Nirogi Healthcare</strong>
        <p>District screening platform</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <h1>Sign in</h1>
      <p class="hint">Use your assigned healthcare account to continue.</p>

      @if (errorMessage()) {
        <div class="alert" role="alert">{{ errorMessage() }}</div>
      }

      <label>
        Username
        <input type="text" formControlName="username" autocomplete="username" />
      </label>

      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      <button type="submit" [disabled]="form.invalid || auth.loading()">
        {{ auth.loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>
  </section>
</main>

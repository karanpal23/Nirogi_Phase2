<div class="shell">
  <aside class="sidebar" aria-label="Primary navigation">
    <a class="brand" routerLink="/dashboard" aria-label="Nirogi dashboard">
      <span>N</span>
      <strong>Nirogi</strong>
    </a>

    <nav>
      @for (item of navItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        >
          <span>{{ item.icon }}</span>
          {{ item.label }}
        </a>
      }
    </nav>
  </aside>

  <div class="workspace">
    <header class="topbar">
      <div>
        <strong>{{ auth.displayName() }}</strong>
        <span>{{ auth.currentUser()?.role }}</span>
      </div>

      <div class="actions">
        <button type="button" class="icon-button" (click)="notifications.markAllRead()" aria-label="Notifications">
          <span>N</span>
          @if (notifications.unreadCount() > 0) {
            <b>{{ notifications.unreadCount() }}</b>
          }
        </button>
        <button type="button" class="ghost-button" (click)="auth.logout()">Logout</button>
      </div>
    </header>

    <main>
      <router-outlet />
    </main>
  </div>
</div>

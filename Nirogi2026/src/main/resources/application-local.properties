
app.env=local  

spring.datasource.url=jdbc:mysql://localhost:3306/nirogi?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root


spring-boot.run.jvmArguments=--add-exports=java.base/sun.security.util=ALL-UNNAMED


spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Local development JWT secret (NEVER commit real secrets to repo)
app.jwt.secret=local-dev-secret-key-32-chars-min-xxxxxxxxxxxxxxxxx
